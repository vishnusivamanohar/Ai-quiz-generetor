<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Quiz Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #7000ff;
            --secondary-glow: #00d4ff;
            --dark-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.15) 0%, transparent 40%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 95%;
            max-width: 700px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .progress-bar-bg {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-glow), var(--secondary-glow));
            transition: width 0.5s ease;
        }

        h2 { font-size: 1.6rem; margin-bottom: 30px; }

        .options-grid { display: grid; gap: 16px; }

        .option-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1rem;
        }

        .option-card:hover:not(.locked) {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--secondary-glow);
            transform: translateX(5px);
        }

        /* Prevent clicking after choice */
        .option-card.locked {
            cursor: default;
            pointer-events: none;
        }

        .correct { background: rgba(34, 197, 94, 0.3) !important; border-color: var(--success) !important; }
        .wrong { background: rgba(239, 68, 68, 0.3) !important; border-color: var(--error) !important; }

        #feedback-area {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            font-weight: 800;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow));
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            float: right;
        }

        .result-screen { text-align: center; display: none; }
        .score-circle {
            width: 140px; height: 140px;
            border: 4px solid var(--secondary-glow);
            border-radius: 50%;
            margin: 20px auto;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 800;
            background: rgba(0, 212, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-view">
            <div style="display:flex; justify-content: space-between; margin-bottom: 10px; opacity: 0.8;">
                <span id="progress-text">Question 1/10</span>
                <span id="score-text">Score: 0</span>
            </div>
            <div class="progress-bar-bg"><div id="progress-fill"></div></div>

            <h2 id="question-text">Loading...</h2>
            <div class="options-grid" id="options-box"></div>
            
            <div id="feedback-area"></div>
            <div style="overflow: auto;">
                <button id="next-btn" class="action-btn" style="display: none;" onclick="nextStep()">Continue →</button>
            </div>
        </div>

        <div id="result-view" class="result-screen">
            <h1>Quiz Results</h1>
            <div class="score-circle" id="final-score">0/10</div>
            <button class="action-btn" style="float:none" onclick="window.location.href='/'">Try Again</button>
        </div>
    </div>

    <script>
        const questions = JSON.parse('{{ questions | tojson | safe }}');
        const answers   = JSON.parse('{{ answers | tojson | safe }}');

        let currentIdx = 0;
        let score = 0;
        let isAnswered = false; // Flag to prevent multiple clicks

        function renderQuestion() {
            isAnswered = false; // Reset flag for new question
            const data = questions[currentIdx];
            const text = data[0];
            const opts = data.slice(1);
            
            document.getElementById('progress-fill').style.width = ((currentIdx + 1) / questions.length * 100) + "%";
            document.getElementById('progress-text').innerText = `Question ${currentIdx + 1}/${questions.length}`;
            document.getElementById('question-text').innerText = text;
            document.getElementById('feedback-area').innerText = "";
            document.getElementById('next-btn').style.display = "none";

            const box = document.getElementById('options-box');
            box.innerHTML = "";
            opts.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option-card';
                div.innerText = opt;
                div.onclick = () => handleChoice(i + 1, div);
                box.appendChild(div);
            });
        }

        function handleChoice(num, element) {
            if (isAnswered) return; // Exit if already clicked
            isAnswered = true; 

            const correctNum = parseInt(answers[currentIdx]);
            const cards = document.querySelectorAll('.option-card');
            
            // Lock all cards
            cards.forEach(c => c.classList.add('locked'));

            if(num === correctNum) {
                element.classList.add('correct');
                document.getElementById('feedback-area').innerHTML = "<span style='color:var(--success)'>CORRECT! +1</span>";
                score++;
                document.getElementById('score-text').innerText = `Score: ${score}`;
            } else {
                element.classList.add('wrong');
                // Highlight the right answer so user learns
                cards[correctNum - 1].classList.add('correct');
                document.getElementById('feedback-area').innerHTML = "<span style='color:var(--error)'>INCORRECT</span>";
            }
            document.getElementById('next-btn').style.display = "block";
        }

        function nextStep() {
            currentIdx++;
            if(currentIdx < questions.length) {
                renderQuestion();
            } else {
                document.getElementById('quiz-view').style.display = "none";
                document.getElementById('result-view').style.display = "block";
                document.getElementById('final-score').innerText = `${score}/${questions.length}`;
            }
        }

        renderQuestion();
    </script>
</body>
</html>
